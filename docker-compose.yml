version: "3.9"

services:

  traefik:
    user: root
    build:
      context: ./traefik
      args:
        DOCKER_GID: 111
    image: restaurant-traefik:latest
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - --providers.docker.watch=true

      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      - "--certificatesresolvers.letsencrypt.acme.email=1nicholasparise@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory"

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt:/letsencrypt"

  db:
    image: postgres:16-bookworm
    build: ./db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fooddb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/fooddb
    expose:
      - "3000"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.api.rule=Host(`api.deglazd.com`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"

      - "traefik.http.services.api.loadbalancer.server.port=3000"

  frontend:
    build: ./frontend
    restart: always
    volumes:
      - uploads:/usr/share/nginx/html/uploads
    environment:
      - INTERNAL_API_URL=http://backend:3000
    expose:
      - "4000"

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.frontend.rule=Host(`deglazd.com`) || Host(`www.deglazd.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"

      - "traefik.http.services.frontend.loadbalancer.server.port=4000"

  db-cron:
    build: ./db-cron
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/fooddb

volumes:
  postgres_data:
  uploads:
  letsencrypt: