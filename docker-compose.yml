version: "3.9"

services:

  traefik:
    image: traefik:v3.0
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"

      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=you@email.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt:/letsencrypt"

  db:
    image: postgis/postgis:16-3.4
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fooddb
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    depends_on:
      - db
    volumes:
      - uploads:/app/uploads
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/fooddb

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.api.rule=Host(`api.siteurl.com`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"

      - "traefik.http.services.api.loadbalancer.server.port=3000"

  frontend:
    build: ./frontend
    restart: always

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.frontend.rule=Host(`siteurl.com`) || Host(`www.siteurl.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"

      - "traefik.http.services.frontend.loadbalancer.server.port=80"

volumes:
  postgres_data:
  uploads:
  letsencrypt: