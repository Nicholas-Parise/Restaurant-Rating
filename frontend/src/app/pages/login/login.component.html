<div class="container">
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="register-form">
    <h2>Login</h2>
    <div>
      <label>Email</label>
      <input type="email" formControlName="email" />
      @if (f['email'].touched && f['email'].invalid) {
      <div class="error">
        Enter a valid email
      </div>
      }
    </div>

    <div>
      <label>Password</label>
      <input type="password" formControlName="password" />
      @if (f['password'].touched && f['password'].invalid) {
      <div class="error">
        Password is required (min 6 chars)
      </div>
      }
    </div>

    @if (errorMessage) {
    <div class="error-message">
      {{ errorMessage }}
    </div>
    }

    <button class="btn" type="submit" [disabled]="loginForm.invalid">Login</button>
    <label>Dont have an account? <a [routerLink]="['/register']">make one!</a></label>
    <hr>

    <button class="btn google-btn" (click)="googleButton()">
      <img class="google" src="assets/google-icon.svg">
      &nbsp; Login with google</button>

  </form>


</div>
