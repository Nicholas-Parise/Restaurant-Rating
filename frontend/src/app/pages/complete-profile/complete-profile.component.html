<div class="container">

    <div class="modal-overlay">
        <div class="modal">
            @if (currentTab === 'account') {
            <h2>Account Settings</h2>
            <section>
                <label>
                    Set username
                    <input type="text" [(ngModel)]="username" name="username" required #usernameCtrl="ngModel" (input)="usernameCheck()" />
                    @if (usernameCtrl.invalid && usernameCtrl.touched) {
                    <div class="error">
                        Username required.
                    </div>
                    }
                      @if (invalidUserErrorMessage) {
                    <div class="error-message">{{ invalidUserErrorMessage }}</div>
                    }
                </label>

            </section>
            <section>
                <h3>Set Password</h3>
                <label>
                    Password
                    <input type="password" [(ngModel)]="password" name="password" required #passwordCtrl="ngModel" />
                    @if (passwordCtrl.invalid && passwordCtrl.touched) {
                    <div class="error">
                        Password required.
                    </div>
                    }
                  

                </label>
                <label>
                    Password
                    <input type="password" [(ngModel)]="password_confirm" name="password_confirm" required
                        #password_confirmCtrl="ngModel" />
                    @if (password_confirmCtrl.invalid && password_confirmCtrl.touched) {
                    <div class="error">
                        Password required.
                    </div>
                    }
                </label>
            </section>
            <div class="modal-actions">
                <button class="btn btn-success" [class.btn-disabled]="isDisabled" [disabled]="isDisabled" type="button" (click)="submitAccount()">
                    Continue
                </button>
            </div>
            }

            @if (currentTab === 'profile') {
            <form (ngSubmit)="onSubmit()" enctype="multipart/form-data" class="user-form">

                <h2>Profile Settings</h2>
                <label>Display Name
                    <input type="text" [(ngModel)]="name" name="name" />
                    <span>characters left: {{50-(name?.length ?? 0)}}</span>
                </label>
                <label>Bio
                    <textarea [(ngModel)]="bio" name="bio" rows="3"></textarea>
                    <span>characters left: {{200-(bio?.length ?? 0)}}</span>
                </label>
                <label class="toggle-label">Email Notifications</label>
                <label class="switch">
                    <input type="checkbox" [(ngModel)]="notifications" [ngModelOptions]="{standalone: true}"
                        name="advancedToggle" />
                    <span class="slider round"></span>
                </label>
                <label for="picture">Upload Profile Picture
                    <div class="photoArea">
                        <input type="file" (change)="onFileSelected($event)" accept="image/*" />
                        @if (previewUrl) {
                        <button type="button" (click)="removeImage()"
                            style="background: none; border: none; margin-left: 8px; cursor: pointer;">
                            <i class="fas fa-trash" style="color: #d00;"></i>
                        </button>
                        }
                        @if (previewUrl) {
                        <img [src]="previewUrl" style="max-width: 300px; max-height: 300px;" />
                        }
                    </div>
                </label>
                <div class="modal-actions">
                    <button class="btn btn-success" type="submit">Save Changes</button>

                </div>
            </form>
            }

            @if (error) {
            <div class="error-message">
                {{ error }}
            </div>
            }
        </div>
    </div>

</div>
